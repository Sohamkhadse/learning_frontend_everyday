<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
body {
    display: grid;
    place-items: center;
    height: 100vh;
    /* background: black; */
}
.container {
    width: 200px;
    height: 200px;
    perspective: 800px;
    perspective-origin: 50% -100%;
}
.triangle {
    transform-style: preserve-3d;
    position: relative;
    animation: rotateItem 5s infinite linear;
}
.sides {
    position: absolute;
    width: 0;
    height: 0;
    border-right: 80px solid transparent;
    border-left: 80px solid transparent;
    border-bottom: 160px solid rgba(255, 254, 254, 0.5);
}
.front {
    border-bottom: 160px solid rgba(200, 28, 28, 0.5);
    transform: rotateX(30deg) translateZ(46px);
}
.back {
    border-bottom: 160px solid rgba(31, 213, 213, 0.5);
    transform: rotateX(-30deg) translateZ(-46px);
}
.left {
    border-bottom: 160px solid rgba(104, 63, 227, 0.5);
    transform: rotateY(90deg) rotateX(-30deg) translateZ(-46px);
}
.right {
    border-bottom: 160px solid rgba(239, 255, 22, 0.5);
    transform: rotateY(-90deg) rotateX(-30deg) translateZ(-46px);
}
.bottom {
    position: absolute;
    background: white;
    width: 160px;
    height: 160px;
    transform: rotateX(90deg) translateZ(-46px);
}
@keyframes rotateItem {
  0% {
    transform: rotateY(0deg);
  }
  100% {
    transform: rotateY(360deg);
  }
}
    </style>
</head>

<body>
    <div class="container">
        <div class="triangle">
            <div class="sides right"></div>
            <div class="sides left"></div>
            <div class="sides back"></div>
            <div class="sides front"></div>
            <div class="bottom"></div>
        </div>
    </div>
</body>

</html>
