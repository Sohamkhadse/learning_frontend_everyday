<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>monday.com</title>
<style>
    .parent{
        height: 665px;
        width: 665px;
        border:1px solid black;
        margin: 10rem auto;
        display:grid;
        grid-template-columns: 200px 200px 200px;
        grid-template-rows: 200px 200px 200px;
        gap:2rem;
        justify-items: stretch;


        /* text */
        text-align: center;
        text-decoration:underline;
        text-decoration:wavy ;
        text-transform: capitalize;
        text-wrap:initial;

        /* font-family */
        font-family:cursive;
        font-weight: 90px;
        font-style: italic;
        font-size: 2em;
        align-items: center;


    }
    .y1{
        height: 200px;
        width:200px;
        background-color: aqua;
        grid-column: 1/2;
        
        
    }

</style>

</head>
<body>

    <div class="parent">
        <div class="y1 x1">day 1</div>
        <div class="y1 x2">day 2</div>
        <div class="y1 x3">day 3</div>
        <!-- <div class="y1 x4">day 4</div> 
        <div class="y1 x5">day 5</div>
        <div class="y1 x6">day 6</div>  -->

    </div>
    
</body>
</html>
