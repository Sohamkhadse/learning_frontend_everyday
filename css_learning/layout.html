<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>layout</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            background-color: rgb(40, 41, 84);
        }
        .container{
            width:520px;
            height: 400px;
            padding-inline-start: 10px;
            margin:50px auto;
            background-color: rgb(40, 41, 84);
            display:grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr 1fr;
            justify-items: stretch;
            justify-content: stretch;
            gap: 10px;
        }
        .box{
            padding:0;
            margin:0;
            width: 100%;
            height: 100%;
            background-color: rgb(207, 24, 24);
            border: 2px solid black;
            
            
            /* padding: 30px; */
            
        }
        
        .b1{
            grid-row: 1 / 4 ;
            /* grid-template-rows: 1 / 3 ; */
            background-color: rgb(15, 236, 15);
        }

        .b2{
            grid-column: 2 / 4 ;
            /* grid-template-columns: 2 / 4 ; */
            background-color: rgb(20, 248, 20);
        }

        .b3{
            grid-column: 4 / 5 ;
            /* grid-template-columns: 4 / 5 ; */
            background-color: rgb(232, 14, 14);
        }
        .b4{
            grid-column: 2 / 3 ;
            /* grid-template-columns: 4 / 5 ; */
            background-color: rgb(238, 108, 72);
        }

        .b6{
            grid-row: 2 / 4 ;
            grid-column: 4 / 4;
            /* grid-template-columns: 2 / 4 ; */
            background-color: rgb(59, 229, 59);
        }

        </style>
</head>
<body>
    <div class="container">
        <div class="box b1">b1</div>
        <div class="box b2">b2</div>
        <div class="box b3">b3</div>
        <div class="box b4" style="background-color: orange">b4</div>
        <div class="box b5">b5</div>
        <div class="box b6">b6</div>
        <div class="box b7">b7</div>
        <div class="box b8" style="background-color: orange;">b8</div>
        </div>    
</body>
</html>
