<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Layout</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box; /* Better for sizing boxes with borders */
        }
        
        body {
            background-color: rgb(40, 41, 84);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 520px;
            height: 400px;
            background-color: rgb(40, 41, 84); /* Matching the dark divider color */
            display: grid;
            /* 4 columns, 3 rows */
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            padding: 10px;
        }

        .box {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            font-weight: bold;
            color: rgba(0,0,0,0.3); 
        }

    
        .b1 {
            grid-row: 1 / 4;
            grid-column: 1;
            background-color: #70bd51;
        }

  
        .b2 {
            grid-column: 2 / 4;
            grid-row: 1;
            background-color: #70bd51;
        }

        .b3 {
            grid-column: 4;
            grid-row: 1;
            background-color: #ef3d3d;
        }

    
        .b4 {
            background-color: #ffb433;
        }

      
        .b5 {
            background-color: #ef3d3d;
        }

     
        .b6 {
            background-color: #ef3d3d;
        }


        .b7 {
            background-color: #ffb433;
        }
        .b8 {
            grid-column: 4;
            grid-row: 2 / 4;
            background-color: #70bd51;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box b1"></div>
        <div class="box b2"></div>
        <div class="box b3"></div>
        <div class="box b4"></div>
        <div class="box b5"></div>
        <div class="box b6"></div>
        <div class="box b7"></div>
        <div class="box b8"></div>
    </div>    
</body>
</html>
