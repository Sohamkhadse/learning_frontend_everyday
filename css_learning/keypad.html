<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>monday.com</title>
    <style>
        .parent{
            height:400px;
            width:400px;
            margin:auto;
            border:2px solid black;
            display:grid;
            grid-template-columns: repeat(3,1fr); 
            padding-left: 30px;
            padding-top: 20px;
            background-color: rgb(198, 249, 12);
            border-radius: 20px;
        }

        .x{
            height:60px;
            width:100px;
            /* border:2px solid red; */
            display:grid;
            justify-content:center;
            align-items:center;
            background-color: rgb(14, 235, 117);
            font-size: 30px;
            background: conical-gradient(from 180deg at 50% 50%, rgb(14, 235, 117), rgb(198, 249, 12));
            border-radius: 10px;
        
        }
    </style>
</head>
<body>

    <div class="parent">
        <div class="x y1">1</div>
        <div class="x y2">2</div>
        <div class="x y3">3</div>
        <div class="x y4">4</div>
        <div class="x y5">5</div>
        <div class="x y6">6</div>
        <div class="x y7">7</div>
        <div class="x y8">8</div>
        <div class="x y9">9</div>
        <div class="x y10">*</div>
        <div class="x y11">0</div>
        <div class="x y12">#</div>
    </div>
    
</body>
</html>
